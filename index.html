:root{

  --teal-900:#04332E;
  --teal-800:#06443C;
  --teal-700:#056250;
  --teal-600:#0B6D57;
  --lime:#9CD776;
  --lime-bright:#B9FF8C;
  --lime-soft:#E4FFD6;
  --orange:#EE9D67;
  --coral:#EF4D45;

  --paper:#FBFCF9;
  --paper-2:#F1F5EC;
  --ink:#14231F;
  --muted:#3E5049;
  --line:#DCE5DC;
  --ink-inverse:#F2FBF4;
  --muted-inverse:#BFE0CE;

  --dv-orange:#C25A14;
  --dv-blue:#4C74B0;
  --dv-green:#4C8B22;

  --dvd-orange:#D06D30;
  --dvd-blue:#5C82D6;
  --dvd-green:#5FA02A;

html{scroll-behavior:smooth}
body{
  margin:0;font-family:var(--body);color:var(--ink);background:var(--paper);
  font-size:1.0625rem;line-height:1.6;-webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:var(--display);line-height:1.12;text-wrap:balance;margin:0}
p{text-wrap:pretty}
img{max-width:100%}
a{color:var(--teal-700)}
.wrap{max-width:1080px;margin-inline:auto;padding-inline:clamp(1.1rem,4vw,2.5rem)}
.prose{max-width:72ch}

/* ============ Gate de senha ============ */
#gate{
  position:fixed;top:0;right:0;bottom:0;left:0;z-index:var(--z-gate);display:flex;justify-content:center;
  background:var(--teal-900);overflow-y:auto;padding:1.5rem;
  -webkit-overflow-scrolling:touch;
}
#gate .waves{position:absolute;top:0;right:0;bottom:0;left:0;pointer-events:none}
.gate-card{position:relative;text-align:center;max-width:24rem;width:100%;margin:auto}
.gate-row button[disabled]{opacity:.7;cursor:wait}
.gate-card img{width:min(15rem,70%);height:auto;display:block;margin:0 auto 0.6rem}
.gate-card .tagline{
  font-family:var(--display);font-weight:700;font-size:1.25rem;color:var(--lime-bright);margin:0 0 2.2rem;
}
.gate-card label{
  display:block;font-weight:700;font-size:.95rem;color:var(--muted-inverse);
  text-align:left;margin-bottom:.45rem;
}
.gate-row{display:flex;gap:.55rem}
.gate-row input{
  flex:1;min-width:0;border:2px solid rgba(255,255,255,.25);border-radius:.75rem;
  background:rgba(255,255,255,.07);color:var(--ink-inverse);
  font:inherit;font-weight:600;padding:.7rem 1rem;letter-spacing:.08em;
}
.gate-row input::placeholder{color:#9FC4B4;letter-spacing:normal}
.gate-row input:focus{outline:none;border-color:var(--lime)}
.gate-row button{
  border:0;border-radius:.75rem;padding:.7rem 1.35rem;cursor:pointer;
  font-family:var(--display);font-weight:700;font-size:1.05rem;
  background:var(--lime);color:var(--teal-950);
  transition:transform .18s cubic-bezier(.25,1,.5,1),background .18s;
}
.gate-row button:hover{background:var(--lime-bright);transform:translateY(-1px)}
.gate-err{min-height:1.5rem;margin:.6rem 0 0;font-weight:700;color:#FFB4A6;text-align:left;font-size:.95rem}
.gate-note{margin-top:2.4rem;font-size:.85rem;color:#7FA795}
.gate-card.shake{animation:shake .4s cubic-bezier(.36,.07,.19,.97)}
@keyframes shake{20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}

/* ============ Ondas (motivo da marca) ============ */
.wave-drift{animation:waveDrift 14s ease-in-out infinite alternate}
.wave-drift.w2{animation-duration:19s;animation-delay:-6s}
.wave-drift.w3{animation-duration:23s;animation-delay:-11s}
@keyframes waveDrift{
  from{transform:translateX(-2.5%) translateY(0)}
  to{transform:translateX(2.5%) translateY(1.2%)}
}
.arcs path{transform-origin:center;animation:arcPulse 3.2s cubic-bezier(.25,1,.5,1) infinite}
.arcs path:nth-child(2){animation-delay:.35s}
@keyframes arcPulse{0%,100%{opacity:.55}35%{opacity:1}}

/* ============ Navegação ============ */
.topnav{
  position:sticky;top:0;z-index:var(--z-nav);
  background:var(--teal-950);color:var(--ink-inverse);
  border-bottom:1px solid rgba(255,255,255,.08);
}
.topnav .bar{display:flex;align-items:center;gap:1rem;padding-block:.55rem;flex-wrap:wrap}
.topnav .brand{display:flex;align-items:center;gap:.6rem;margin-right:auto;text-decoration:none}
.topnav .brand img{height:2.1rem;width:auto;display:block}
.topnav nav{display:flex;gap:.25rem;flex-wrap:wrap}
.topnav nav a{
  color:var(--muted-inverse);text-decoration:none;font-weight:700;font-size:.95rem;
  padding:.45rem .8rem;border-radius:.6rem;transition:color .15s,background .15s;
}
.topnav nav a:hover{color:#fff;background:rgba(255,255,255,.08)}
.topnav nav a[aria-current="page"]{color:var(--teal-950);background:var(--lime)}

/* ============ Views ============ */
.view{display:none}
.view.active{display:block}

/* ============ Hero (Início) ============ */
.hero{
  position:relative;background:var(--teal-900);color:var(--ink-inverse);overflow:hidden;
  padding-block:clamp(4rem,9vh,7rem) clamp(3rem,7vh,5.5rem);
}
.hero .waves{position:absolute;top:0;right:0;bottom:0;left:0;pointer-events:none}
.hero .wrap{position:relative}
.hero-logo{width:min(21rem,62vw);height:auto;display:block;margin-bottom:.75rem}
.hero .slogan{
  font-family:var(--display);font-weight:700;font-size:clamp(1.15rem,2.6vw,1.5rem);
  color:var(--lime-bright);margin:0 0 3.2rem;
}
.hero h1{
  font-size:clamp(2.1rem,5.2vw,3.9rem);font-weight:800;letter-spacing:-.01em;
  max-width:17ch;color:#fff;
}
.hero h1 .big{color:var(--lime-bright)}
.hero .hero-sub{
  margin:1.1rem 0 0;max-width:52ch;font-size:clamp(1rem,2vw,1.2rem);color:var(--muted-inverse);
}
/* faixa de frequências: números no vocabulário de dial de rádio */
.dial{
  margin-top:clamp(2.6rem,6vh,4rem);border-top:1px solid rgba(255,255,255,.16);
  display:flex;flex-wrap:wrap;
}
.dial-stop{
  flex:1 1 12rem;padding:1.3rem 1.4rem 0 0;position:relative;
}
.dial-stop::before{
  content:"";position:absolute;top:-1px;left:0;width:2.4rem;height:3px;background:var(--orange);
}
.dial-stop .num{
  font-family:var(--display);font-weight:800;font-size:clamp(1.9rem,3.6vw,2.7rem);
  color:#fff;line-height:1.05;
}
.dial-stop .num em{font-style:normal;color:var(--lime-bright)}
.dial-stop .lbl{margin:.3rem 0 0;font-size:.95rem;color:var(--muted-inverse);max-width:22ch}

/* lista editorial de relatórios */
.reports{background:var(--paper);padding-block:clamp(2.8rem,6vh,4.5rem)}
.reports h2{font-size:clamp(1.6rem,3vw,2.1rem);color:var(--teal-900);margin-bottom:.4rem}
.reports .lead{color:var(--muted);margin:0 0 2rem;max-width:60ch}
.report-row{
  display:flex;align-items:center;gap:clamp(.9rem,3vw,2rem);
  padding:1.5rem 0;border-top:1px solid var(--line);
  text-decoration:none;color:inherit;
}
.report-row:last-of-type{border-bottom:1px solid var(--line)}
.report-row .idx{
  font-family:var(--display);font-weight:800;font-size:2rem;color:var(--lime);min-width:2.4rem;
  transition:color .18s;
}
.report-row .txt{flex:1;min-width:0}
.report-row h3{font-size:clamp(1.2rem,2.4vw,1.55rem);color:var(--teal-900);transition:color .18s}
.report-row p{margin:.25rem 0 0;color:var(--muted);font-size:.98rem;max-width:60ch}
.report-row .go{
  font-family:var(--display);font-weight:800;font-size:1.5rem;color:var(--teal-700);
  transition:transform .22s cubic-bezier(.25,1,.5,1);
}
.report-row:hover h3{color:var(--teal-700)}
.report-row:hover .idx{color:var(--dv-green)}
.report-row:hover .go{transform:translateX(.4rem)}

/* ============ Cabeçalho das páginas de relatório ============ */
.page-hero{
  position:relative;background:var(--teal-900);color:var(--ink-inverse);overflow:hidden;
  padding-block:clamp(2.8rem,6vh,4.2rem);
}
.page-hero .waves{position:absolute;top:0;right:0;bottom:0;left:0;pointer-events:none;opacity:.85}
.page-hero .wrap{position:relative}
.page-hero .crumb{font-weight:800;font-size:.9rem;color:var(--orange);margin:0 0 .7rem}
.page-hero h2{font-size:clamp(1.9rem,4.4vw,3rem);font-weight:800;color:#fff;max-width:22ch}
.page-hero .sub{margin:.8rem 0 0;color:var(--muted-inverse);max-width:62ch;font-size:1.05rem}
.page-hero .meta{margin:1.4rem 0 0;font-size:.88rem;color:#7FA795;font-weight:600}

/* faixa de destaques no topo do relatório */
.kpis{display:flex;flex-wrap:wrap;gap:1px;background:rgba(255,255,255,.14);margin-top:2rem;border-radius:.9rem;overflow:hidden}
.kpi{flex:1 1 10rem;background:var(--teal-800);padding:1rem 1.2rem}
.kpi .v{font-family:var(--display);font-weight:800;font-size:clamp(1.3rem,2.6vw,1.7rem);color:var(--lime-bright)}
.kpi .k{font-size:.85rem;color:var(--muted-inverse);margin-top:.15rem}

/* ============ Corpo dos relatórios ============ */
.section{padding-block:clamp(2.4rem,5vh,3.8rem)}
.section.alt{background:var(--paper-2)}
.section h3{
  font-size:clamp(1.45rem,2.8vw,1.9rem);color:var(--teal-900);margin-bottom:.4rem;
}
.section h3 + p.lead{color:var(--muted);margin:0 0 1.8rem;max-width:66ch}
.section h4{font-size:1.15rem;color:var(--teal-800);margin:1.8rem 0 .7rem}

/* tabelas */
.tbl-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:.8rem;background:#fff}
table{border-collapse:collapse;width:100%;font-size:.95rem;min-width:38rem}
thead th{
  background:var(--teal-900);color:#fff;text-align:left;font-family:var(--display);
  font-weight:700;font-size:.9rem;padding:.65rem .85rem;white-space:nowrap;
}
tbody td{padding:.6rem .85rem;border-top:1px solid var(--line);vertical-align:top}
tbody tr:nth-child(even){background:var(--paper-2)}
tr.total td{background:var(--lime-soft);font-weight:800;color:var(--teal-900);border-top:2px solid var(--lime)}
tr.subtotal td{font-weight:800;color:var(--teal-800)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
tr.hl td{background:#EFFBE4}
tr.hl-inspira td{background:#EFFBE4;font-weight:700}

/* pills de alerta */
.pill{
  display:inline-block;padding:.12rem .6rem;border-radius:99px;font-weight:800;font-size:.72rem;
  letter-spacing:.03em;white-space:nowrap;
}
.pill.alto{background:var(--al-alto-bg);color:var(--al-alto)}
.pill.medioalto{background:var(--al-medioalto-bg);color:var(--al-medioalto)}
.pill.medio{background:var(--al-medio-bg);color:var(--al-medio)}
.pill.baixo{background:var(--al-baixo-bg);color:var(--al-baixo)}
.pill.sd{background:var(--al-sd-bg);color:var(--al-sd)}
.pill.rede{background:#E4EAF4;color:#33517E}
.pill.local{background:#DDF0E9;color:#0A5B47}
.pill.inspira{background:var(--teal-700);color:#fff}

/* fluxo antes/depois */
.flow-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(320px,100%),1fr));gap:1.6rem;align-items:start}
.flow{border:1px solid var(--line);border-radius:.9rem;background:#fff;overflow:hidden}
.flow header{padding:.85rem 1.1rem;font-family:var(--display);font-weight:800;font-size:1.05rem}
.flow.antes header{background:var(--paper-2);color:var(--muted)}
.flow.depois header{background:var(--teal-700);color:#fff}
.flow ol{margin:0;padding:.4rem 0;list-style:none;counter-reset:etapa}
.flow li{
  counter-increment:etapa;display:flex;gap:.85rem;padding:.7rem 1.1rem;
  border-top:1px solid var(--line);align-items:baseline;
}
.flow li::before{
  content:counter(etapa);font-family:var(--display);font-weight:800;color:var(--lime);
  background:var(--teal-900);border-radius:.5rem;min-width:1.6rem;height:1.6rem;
  display:inline-flex;align-items:center;justify-content:center;font-size:.9rem;flex:none;
  position:relative;top:.2rem;
}
.flow.antes li::before{background:#8A9992;color:#fff}
.flow li b{display:block;font-size:.98rem;color:var(--teal-900)}
.flow li span{display:block;font-size:.88rem;color:var(--muted)}

/* pessoas 9 → 6 */
.people{display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;margin:1.2rem 0 0}
.people .team{display:flex;gap:.35rem}
.people .dot{
  width:1.05rem;height:1.05rem;border-radius:50%;background:var(--teal-700);
}
.people .dot.out{background:transparent;border:2px dashed #A9B8B0}
.people .arrow{font-family:var(--display);font-weight:800;font-size:1.3rem;color:var(--dv-orange)}
.people .cap{font-size:.9rem;color:var(--muted);font-weight:700}

/* cards de atenção (lista, não grid de cards) */
.warn-list{margin:0;padding:0;list-style:none}
.warn-list li{
  display:flex;flex-wrap:wrap;gap:.35rem 1rem;padding:1.1rem 0;border-top:1px solid var(--line);align-items:baseline;
}
.warn-list p{flex:1 1 16rem;min-width:0}
.warn-list li:last-child{border-bottom:1px solid var(--line)}
.warn-list .who{
  font-family:var(--display);font-weight:800;color:var(--dv-orange);min-width:9.5rem;font-size:1rem;
}
.warn-list p{margin:0;color:var(--muted);font-size:.97rem;max-width:62ch}

/* ============ Organograma ============ */
.org{--org-line:#B9CEC2}
.org-exec{display:flex;flex-direction:column;align-items:center}
.org-node{
  background:#fff;border:1.5px solid var(--line);border-radius:.8rem;
  padding:.7rem 1.3rem;text-align:center;min-width:11rem;max-width:16rem;
}
.org-node b{display:block;font-family:var(--display);font-weight:800;color:var(--teal-900);font-size:1.02rem}
.org-node span{display:block;font-size:.82rem;color:var(--muted);margin-top:.1rem}
.org-node.lvl0{background:var(--teal-950);border-color:var(--teal-950)}
.org-node.lvl0 b{color:#fff}.org-node.lvl0 span{color:var(--muted-inverse)}
.org-node.lvl1{background:var(--teal-700);border-color:var(--teal-700)}
.org-node.lvl1 b{color:#fff}.org-node.lvl1 span{color:#CDEBDD}
.org-node.dept{background:var(--teal-600);border-color:var(--teal-600)}
.org-node.dept b{color:#fff}.org-node.dept span{color:#CDEBDD}
.org-node.ghost{border-style:dashed;border-color:#A9B8B0;background:transparent}
.org-node.ghost b{color:var(--muted)}
.org-vline{width:2px;height:1.4rem;background:var(--org-line)}
.org-row{
  display:flex;gap:1.2rem;justify-content:center;flex-wrap:wrap;
  padding-top:1.4rem;position:relative;
}
.org-row>.org-col{display:flex;flex-direction:column;align-items:center;gap:0}
.org-committee{
  margin-top:1.6rem;border:2px dashed var(--org-line);border-radius:.9rem;padding:1rem 1.4rem;
  text-align:center;max-width:44rem;
}
.org-committee b{font-family:var(--display);color:var(--teal-800)}
.org-committee p{margin:.2rem 0 0;font-size:.9rem;color:var(--muted)}
.org-agency{
  margin-top:1rem;border:1.5px solid #C9BCE4;background:#F5F1FC;border-radius:.9rem;
  padding:1rem 1.4rem;text-align:center;max-width:40rem;
}
.org-agency b{font-family:var(--display);color:#4A3A78}
.org-agency p{margin:.2rem 0 0;font-size:.9rem;color:#5C4E86}
.org-depts{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1.5rem;margin-top:2rem}
.org-dept-col{display:flex;flex-direction:column;align-items:stretch;gap:.55rem}
.org-dept-col .org-node{max-width:none;min-width:0}
.org-dept-col>.head{margin-bottom:.4rem}
.org-member{
  background:#fff;border:1.5px solid var(--line);border-left:none;border-right:none;
  border:1.5px solid var(--line);border-radius:.7rem;padding:.55rem 1rem;text-align:center;
}
.org-member b{display:block;font-weight:800;color:var(--teal-900);font-size:.95rem}
.org-member span{display:block;font-size:.8rem;color:var(--muted)}
.org-member.ghost{border-style:dashed;border-color:#A9B8B0;background:transparent}
.org-member.ghost b{color:var(--muted)}
.org-note{margin-top:1.2rem;font-size:.85rem;color:var(--muted)}

/* ============ Gráficos ============ */
.chart{margin:1.6rem 0 0}
.chart .chart-title{font-family:var(--display);font-weight:800;color:var(--teal-900);font-size:1.05rem}
.chart .chart-sub{font-size:.88rem;color:var(--muted);margin:.15rem 0 1rem}
.legend{display:flex;gap:1.2rem;flex-wrap:wrap;margin:.4rem 0 .9rem;font-size:.85rem;font-weight:700;color:var(--muted)}
.legend i{display:inline-block;width:.8rem;height:.8rem;border-radius:.25rem;margin-right:.4rem;vertical-align:-.08rem}
.bar-chart{display:flex;flex-direction:column;gap:.3rem}
.bar-row{display:grid;grid-template-columns:minmax(7.2rem,11rem) 1fr;gap:.7rem;align-items:center}
.bar-row .name{
  font-size:.83rem;font-weight:700;color:var(--muted);text-align:right;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.bar-row.is-inspira .name{color:var(--teal-700);font-weight:800}
.bar-track{position:relative;height:1.15rem;display:flex;align-items:center}
.bar-fill{
  height:100%;border-radius:0 4px 4px 0;min-width:2px;
  transform-origin:left center;
}
.anim .bar-fill{animation:grow .9s cubic-bezier(.25,1,.5,1) both}
@keyframes grow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.bar-val{
  font-size:.78rem;font-weight:800;color:var(--ink);margin-left:.45rem;white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.bar-val.inside{position:absolute;right:.55rem;margin:0;color:#fff}
.pair-h{font-family:var(--display);font-weight:800;color:var(--teal-900);margin:0 0 .25rem;font-size:.98rem}
.chart-note{font-size:.83rem;color:var(--muted);margin-top:.9rem;max-width:70ch}
.svg-chart{width:100%;height:auto;display:block;margin-top:.6rem}
.svg-chart text{font-family:var(--body)}

/* comparativo de custos */
.cost-chart .bar-row{grid-template-columns:minmax(8.5rem,12rem) 1fr}
.cost-pair{display:flex;flex-direction:column;gap:.25rem;margin-bottom:.9rem}

/* tooltip */
#tip{
  position:fixed;z-index:var(--z-tip);pointer-events:none;opacity:0;
  background:var(--teal-950);color:#fff;border-radius:.6rem;padding:.55rem .8rem;
  font-size:.83rem;line-height:1.45;max-width:19rem;transition:opacity .12s;
  box-shadow:0 6px 24px rgba(0,0,0,.25);
}
#tip b{color:var(--lime-bright)}
#tip.on{opacity:1}

/* linha de crescimento */
.growth-wrap{background:#fff;border:1px solid var(--line);border-radius:.9rem;padding:1.2rem;margin-top:1rem;overflow-x:auto}
.growth-wrap svg{min-width:34rem}

/* alertas (análise) */
.alert-list{margin:0;padding:0;list-style:none}
.alert-list li{border-top:1px solid var(--line);padding:1.15rem 0;display:flex;gap:1rem;flex-wrap:wrap;align-items:baseline}
.alert-list li:last-child{border-bottom:1px solid var(--line)}
.alert-list .who{font-family:var(--display);font-weight:800;color:var(--teal-900);min-width:15rem}
.alert-list .who small{display:block;font-family:var(--body);font-weight:600;color:var(--muted);font-size:.85rem}
.alert-list p{margin:0;flex:1;min-width:16rem;color:var(--muted);font-size:.95rem;max-width:62ch}
.note-box{
  background:var(--lime-soft);border-radius:.9rem;padding:1.1rem 1.4rem;margin-top:1.6rem;
  font-size:.92rem;color:#2C4A20;max-width:75ch;
}

/* faixa lima drenched (eco do card da marca) */
.lime-band{position:relative;background:var(--lime);color:var(--teal-950);overflow:hidden}
.lime-band .waves{position:absolute;top:0;right:0;bottom:0;left:0;pointer-events:none}
.lime-band .wrap{position:relative;padding-block:clamp(2.6rem,6vh,4rem)}
.lime-band h3{color:var(--teal-950);font-size:clamp(1.5rem,3vw,2rem)}
.lime-band ul{margin:1.2rem 0 0;padding:0;list-style:none;max-width:72ch}
.lime-band li{
  padding:.75rem 0 .75rem 1.9rem;position:relative;font-weight:600;color:#123A16;
  border-top:1px solid rgba(3,39,35,.18);font-size:.99rem;
}
.lime-band li::before{
  content:"";position:absolute;left:0;top:1.15rem;width:.95rem;height:.55rem;
  border-left:3px solid var(--teal-950);border-bottom:3px solid var(--teal-950);
  transform:rotate(-45deg);border-radius:1px;
}

/* conclusões / recomendações em 2 colunas assimétricas */
.duo{display:grid;grid-template-columns:1fr;gap:2rem}
@media(min-width:900px){.duo{grid-template-columns:5fr 7fr}}

/* footer */
footer{
  position:relative;background:var(--teal-950);color:var(--muted-inverse);overflow:hidden;margin-top:0;
}
footer .waves{position:absolute;top:0;right:0;bottom:0;left:0;pointer-events:none;opacity:.7}
footer .wrap{position:relative;padding-block:2.6rem;display:flex;align-items:center;gap:1.4rem;flex-wrap:wrap}
footer img{height:2.6rem;width:auto}
footer .fslogan{font-family:var(--display);font-weight:700;color:var(--lime-bright)}
footer small{margin-left:auto;font-size:.8rem;color:#7FA795}

/* ============ Balanço Financeiro ============ */
.fin-lock{
  max-width:26rem;background:#fff;border:1px solid var(--line);border-radius:.9rem;padding:1.6rem;
}
.fin-lock label{display:block;font-weight:700;font-size:.95rem;color:var(--muted);margin-bottom:.45rem}
.fin-lock .gate-row input{
  border-color:var(--line);background:var(--paper-2);color:var(--ink);
}
.fin-lock .gate-row input:focus{border-color:var(--teal-700)}
.fin-lock .gate-row button{background:var(--teal-700);color:#fff}
.fin-lock .gate-row button:hover{background:var(--teal-600)}
.fin-lock .gate-err{color:var(--al-alto)}
.fin-lock.shake{animation:shake .4s cubic-bezier(.36,.07,.19,.97)}
.fin-toolbar{display:flex;gap:.9rem;align-items:end;flex-wrap:wrap;margin:0 0 1.1rem}
.fin-toolbar .field{min-width:14rem}
.fin-input{
  border:1.5px solid var(--line);border-radius:.6rem;padding:.5rem .75rem;font:inherit;
  background:#fff;color:var(--ink);width:100%;
}
.fin-input:focus{outline:none;border-color:var(--teal-700)}
.field>label{display:block;font-size:.83rem;font-weight:800;color:var(--muted);margin-bottom:.3rem}
.fin-form{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.9rem;
  max-width:58rem;align-items:end;background:#fff;border:1px solid var(--line);
  border-radius:.9rem;padding:1.2rem;
}
.fin-form .full{grid-column:1/-1}
.fin-actions{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
.btn{
  font-family:var(--display);font-weight:700;font-size:.98rem;padding:.55rem 1.15rem;
  border-radius:.7rem;border:0;cursor:pointer;transition:background .15s,transform .15s;
}
.btn.primary{background:var(--teal-700);color:#fff}
.btn.primary:hover{background:var(--teal-600)}
.btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--teal-800)}
.btn.ghost:hover{border-color:var(--teal-700)}
.mini{
  font:inherit;font-size:.76rem;font-weight:800;padding:.18rem .6rem;border-radius:.5rem;
  border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--teal-800);white-space:nowrap;
}
.mini:hover{border-color:var(--teal-700)}
.mini.del{color:var(--al-alto)}
.mini.del:hover{border-color:var(--al-alto)}
.fin-msg{min-height:1.3rem;font-size:.88rem;font-weight:700;color:var(--al-baixo);margin:.5rem 0 0}
td.sal-nd{color:var(--muted);font-style:italic}

/* voltar ao topo das páginas */
.backrow{display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap;padding-block:1.6rem}
.backrow a{
  font-family:var(--display);font-weight:800;text-decoration:none;color:var(--teal-700);
  padding:.5rem .9rem;border:1.5px solid var(--line);border-radius:.7rem;background:#fff;
}
.backrow a:hover{border-color:var(--teal-700)}

/* ============ Motion / a11y ============ */
:focus-visible{outline:3px solid var(--dv-orange);outline-offset:2px;border-radius:.3rem}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001s!important;animation-iteration-count:1!important;transition-duration:.001s!important}
  html{scroll-behavior:auto}
}
@media(max-width:720px){
  .bar-row{grid-template-columns:minmax(6rem,7.6rem) 1fr}
  .alert-list .who{min-width:100%}
  .warn-list .who{min-width:100%}
  /* nav em 1 linha rolável, sem quebrar em 2 linhas */
  .topnav nav{
    width:100%;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;margin:0 calc(-1 * clamp(1.1rem,4vw,2.5rem));
    padding:0 clamp(1.1rem,4vw,2.5rem) .4rem;
  }
  .topnav nav::-webkit-scrollbar{display:none}
  .topnav nav a{padding:.55rem .8rem;font-size:.9rem;white-space:nowrap;flex:none}
  .topnav .brand img{height:1.9rem}
}
/* alvos de toque maiores em telas de toque */
@media(pointer:coarse){
  .topnav nav a{padding:.65rem .9rem}
  .mini{padding:.45rem .85rem;font-size:.82rem}
  .backrow a{padding:.7rem 1.1rem}
}
</style>
</head>

var gate = document.getElementById('gate');
var app = document.getElementById('app');
var gateForm = document.getElementById('gateForm');
var gateErr = document.getElementById('gateErr');
var pwd = document.getElementById('pwd');

function decryptPayload(b64, pass){
  var raw = Uint8Array.from(atob(b64), function(c){ return c.charCodeAt(0); });
  var salt = raw.slice(0, 16), iv = raw.slice(16, 28), ct = raw.slice(28);
  return crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey'])
    .then(function(km){
      return crypto.subtle.deriveKey(
        {name:'PBKDF2', salt:salt, iterations:150000, hash:'SHA-256'},
        km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    })
    .then(function(key){ return crypto.subtle.decrypt({name:'AES-GCM', iv:iv}, key, ct); })
    .then(function(buf){ return new TextDecoder().decode(buf); });
}
function gateFail(){
  gateErr.textContent = 'Senha incorreta. Tente novamente.';
  gateForm.classList.remove('shake');
  void gateForm.offsetWidth;
  gateForm.classList.add('shake');
  pwd.select();
}
var appUnlocked = false;
function unlock(html){
  if(appUnlocked) return;
  appUnlocked = true;
  if(html !== null) app.innerHTML = html;
  gate.style.display = 'none';
  app.hidden = false;
  initApp();
  route();
}
function setBusy(form, on, labelOn, labelOff){
  var btn = form.querySelector('button[type="submit"], button:not([type])');
  if(!btn) return;
  btn.disabled = on;
  btn.textContent = on ? labelOn : labelOff;
}
function attemptUnlock(val, interactive){
  if(ENC_APP){
    if(interactive) setBusy(gateForm, true, 'Abrindo…', 'Entrar');
    decryptPayload(ENC_APP, val).then(function(html){
      try{ localStorage.setItem(AUTH_KEY, val); }catch(e){}
      unlock(html);
    }).catch(function(){
      setBusy(gateForm, false, 'Abrindo…', 'Entrar');
      if(interactive) gateFail();
    });
  }else if(val === AUTH_PASSWORD){
    try{ localStorage.setItem(AUTH_KEY, '1'); }catch(e){}
    unlock(null);
  }else if(interactive){
    gateFail();
  }
}
gateForm.addEventListener('submit', function(ev){
  ev.preventDefault();
  attemptUnlock(pwd.value, true);
});

/* =================== Motion helpers =================== */
var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* =================== Router (hash) =================== */
var VIEWS = ['inicio','reestruturacao','organograma','analise','financeiro'];
var counted = false;

function route(){
  if(app.hidden) return;
  var id = (location.hash || '#inicio').slice(1);
  if(VIEWS.indexOf(id) < 0) id = 'inicio';
  VIEWS.forEach(function(v){
    var sec = document.getElementById('view-' + v);
    var active = v === id;
    sec.classList.toggle('active', active);
    document.querySelectorAll('[data-nav="' + v + '"]').forEach(function(a){
      if(active) a.setAttribute('aria-current','page');
      else a.removeAttribute('aria-current');
    });
  });
  window.scrollTo(0,0);
  if(id === 'inicio') runCountUps();
  finRelock(); /* Balanço Financeiro pede senha a cada entrada */
  requestAnimationFrame(armCharts);
}
window.addEventListener('hashchange', route);

/* =================== Count-up do hero =================== */
function runCountUps(){
  if(counted) return;
  counted = true;
  document.querySelectorAll('[data-count]').forEach(function(el){
    var target = parseInt(el.getAttribute('data-count'), 10);
    if(reduceMotion){ el.textContent = fmtInt(target); return; }
    var dur = 1400, t0 = null;
    function step(ts){
      if(t0 === null) t0 = ts;
      var p = Math.min((ts - t0) / dur, 1);
      var eased = 1 - Math.pow(1 - p, 4); /* ease-out-quart */
      el.textContent = fmtInt(Math.round(target * eased));
      if(p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}
function fmtInt(n){ return n.toLocaleString('pt-BR'); }

/* =================== Tooltip =================== */
var tip = document.getElementById('tip');
function tipShow(html, x, y){
  tip.innerHTML = html;
  tip.classList.add('on');
  tipMove(x, y);
}
function tipMove(x, y){
  var w = tip.offsetWidth, h = tip.offsetHeight;
  var left = Math.min(Math.max(8, x + 14), window.innerWidth - w - 8);
  var top = y - h - 12; if(top < 8) top = y + 18;
  tip.style.left = left + 'px'; tip.style.top = top + 'px';
}
function tipHide(){ tip.classList.remove('on'); }
window.addEventListener('scroll', tipHide, {passive:true});
function bindTips(root){
  root.querySelectorAll('[data-tip]').forEach(function(el){
    el.addEventListener('mouseenter', function(e){ tipShow(el.getAttribute('data-tip'), e.clientX, e.clientY); });
    el.addEventListener('mousemove', function(e){ tipMove(e.clientX, e.clientY); });
    el.addEventListener('mouseleave', tipHide);
    el.addEventListener('focus', function(){ var r = el.getBoundingClientRect(); tipShow(el.getAttribute('data-tip'), r.left + r.width/2, r.top); });
    el.addEventListener('blur', tipHide);
  });
}

/* =================== Gráfico: seguidores =================== */
function buildFollowers(){
  var host = document.getElementById('followersBars');
  var max = 530500;
  var html = PERFIS.map(function(p){
    var val = p.seg === null ? 0 : p.seg;
    var w = p.seg === null ? 0 : Math.max(val / max * 100, 0.35);
    var color = TIPO_COLOR[p.tipo];
    var tipHtml = '<b>' + p.nome + '</b> · ' + p.perfil + '<br>Seguidores: ' + p.segTxt +
      '<br>Curtidas méd./post: ' + p.curt + '<br>Engajamento: ' + p.engTxt +
      (p.alerta ? '<br>Alerta: ' + ALERTA_LBL[p.alerta][0] : '') + '<br>' + p.obs;
    var inside = w > 76 ? ' inside' : '';
    return '<div class="bar-row' + (p.tipo === 'inspira' ? ' is-inspira' : '') + '" tabindex="0" data-tip="' + escAttr(tipHtml) + '">' +
      '<span class="name">' + p.nome + '</span>' +
      '<span class="bar-track"><span class="bar-fill" style="width:' + w.toFixed(2) + '%;background:' + color + '"></span>' +
      '<span class="bar-val' + inside + '">' + p.segTxt + '</span></span></div>';
  }).join('');
  host.innerHTML = html;
  bindTips(host);
}

/* =================== Gráfico: engajamento =================== */
function buildEngagement(){
  var host = document.getElementById('engBars');
  var rows = PERFIS.filter(function(p){ return p.tipo !== 'rede' && p.eng !== null; })
    .sort(function(a,b){ return b.eng - a.eng; });
  var max = 3.2;
  host.innerHTML = rows.map(function(p){
    var w = Math.max(p.eng / max * 100, 0.8);
    var color = p.tipo === 'inspira' ? 'var(--dv-green)' : 'var(--dv-teal)';
    var inside = w > 76 ? ' inside' : '';
    var tipHtml = '<b>' + p.nome + '</b> · ' + p.perfil + '<br>Engajamento estimado: ' + p.engTxt +
      '<br>Base: ' + p.segTxt + ' seguidores<br>' + p.obs;
    return '<div class="bar-row' + (p.tipo === 'inspira' ? ' is-inspira' : '') + '" tabindex="0" data-tip="' + escAttr(tipHtml) + '">' +
      '<span class="name">' + p.nome + '</span>' +
      '<span class="bar-track"><span class="bar-fill" style="width:' + w.toFixed(2) + '%;background:' + color + '"></span>' +
      '<span class="bar-val' + inside + '">' + p.engTxt.replace('~','') + '</span></span></div>';
  }).join('');
  bindTips(host);
}

/* =================== Gráfico: custos antes × depois =================== */
function buildCost(){
  var host = document.getElementById('costBars');
  var groups = [
    {nome:'Folha da equipe', antes:39600, depois:26100},
    {nome:'Ferramentas', antes:589.70, depois:758.80},
    {nome:'Total fixo mensal', antes:40189.70, depois:26858.80}
  ];
  var max = 40189.70;
  host.innerHTML = groups.map(function(g){
    function bar(v, color, lbl){
      var w = Math.max(v / max * 100, 0.6);
      var inside = w > 76 ? ' inside' : '';
      return '<div class="bar-row" tabindex="0" data-tip="' + escAttr('<b>' + g.nome + '</b><br>' + lbl + ': R$ ' + fmtBRL(v)) + '">' +
        '<span class="name">' + lbl + '</span>' +
        '<span class="bar-track"><span class="bar-fill" style="width:' + w.toFixed(2) + '%;background:' + color + '"></span>' +
        '<span class="bar-val' + inside + '">R$ ' + fmtBRL(v) + '</span></span></div>';
    }
    return '<div class="cost-pair"><p class="pair-h">' + g.nome + '</p>' + bar(g.antes, 'var(--dv-blue)', 'Antes') + bar(g.depois, 'var(--dv-teal)', 'Depois') + '</div>';
  }).join('');
  bindTips(host);
}
function fmtBRL(v){
  return v.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

/* =================== Tabela ranking =================== */
function buildRanking(){
  var host = document.getElementById('rankTable');
  var head = '<table><thead><tr><th>#</th><th>Rádio (FM)</th><th>Perfil</th><th>Tipo</th><th class="num">Seguidores</th><th>Curtidas méd./post</th><th class="num">Engaj.</th><th>Alerta</th><th>Observação</th></tr></thead><tbody>';
  var rows = PERFIS.map(function(p){
    var tipoPill = p.tipo === 'inspira' ? '<span class="pill inspira">INSPIRA</span>' :
      p.tipo === 'rede' ? '<span class="pill rede">REDE</span>' : '<span class="pill local">LOCAL</span>';
    var al = p.alerta ? '<span class="pill ' + ALERTA_LBL[p.alerta][1] + '">' + ALERTA_LBL[p.alerta][0] + '</span>' : '—';
    return '<tr' + (p.tipo === 'inspira' ? ' class="hl-inspira"' : '') + '><td>' + p.r + '</td><td><b>' + p.nome + '</b></td><td>' + p.perfil +
      '</td><td>' + tipoPill + '</td><td class="num">' + p.segTxt + '</td><td>' + p.curt +
      '</td><td class="num">' + p.engTxt + '</td><td>' + al + '</td><td style="min-width:18rem">' + p.obs + '</td></tr>';
  }).join('');
  host.innerHTML = head + rows + '</tbody></table>';
}

/* =================== Gráfico: trajetória (SVG linha) =================== */
function buildGrowth(){
  var host = document.getElementById('growthChart');
  var pts = [
    ['Jan/26', 0], ['Fev/26', 2500], ['Mar/26', 5500], ['Abr/26', 8000],
    ['Mai/26', 11000], ['Jun/26', 13500], ['08/Jul', 15000], ['14/Jul', 23991]
  ];
  var W = 920, H = 340, padL = 56, padR = 200, padT = 34, padB = 44;
  var maxY = 25000;
  var iw = W - padL - padR, ih = H - padT - padB;
  function X(i){ return padL + i / (pts.length - 1) * iw; }
  function Y(v){ return padT + (1 - v / maxY) * ih; }

  var grid = '';
  [0, 5000, 10000, 15000, 20000, 25000].forEach(function(v){
    grid += '<line x1="' + padL + '" y1="' + Y(v) + '" x2="' + (W - padR) + '" y2="' + Y(v) + '" stroke="#E3EAE2" stroke-width="1"/>' +
      '<text x="' + (padL - 8) + '" y="' + (Y(v) + 4) + '" text-anchor="end" font-size="12" fill="#5A6B63">' + (v/1000) + ' mil</text>';
  });
  var lineD = pts.map(function(p, i){ return (i ? 'L' : 'M') + X(i).toFixed(1) + ',' + Y(p[1]).toFixed(1); }).join(' ');
  var areaD = lineD + ' L' + X(pts.length - 1).toFixed(1) + ',' + Y(0) + ' L' + X(0) + ',' + Y(0) + ' Z';
  var dots = '', labels = '';
  pts.forEach(function(p, i){
    var vx = X(i), vy = Y(p[1]);
    var viral = p[0] === '14/Jul';
    dots += '<circle cx="' + vx + '" cy="' + vy + '" r="' + (viral ? 7 : 4.5) + '" fill="' + (viral ? '#C25A14' : '#017A5C') + '" stroke="#fff" stroke-width="2"><title>' + p[0] + ': ' + fmtInt(p[1]) + ' seguidores</title></circle>';
    labels += '<text x="' + vx + '" y="' + (H - padB + 20) + '" text-anchor="middle" font-size="12" fill="#5A6B63">' + p[0] + '</text>';
  });
  var annX = X(pts.length - 1), annY = Y(23991);
  var ann = '<g font-size="12.5" fill="#8C3E0B">' +
    '<text x="' + (annX + 12) + '" y="' + (annY + 2) + '" font-weight="800">23.991 seguidores</text>' +
    '<text x="' + (annX + 12) + '" y="' + (annY + 18) + '">+~9 mil em 1 semana:</text>' +
    '<text x="' + (annX + 12) + '" y="' + (annY + 34) + '">reel viral de 09/07</text></g>';

  host.innerHTML =
    '<p class="chart-title">Trajetória estimada de seguidores desde a estreia (jan/2026)</p>' +
    '<svg class="svg-chart" viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="Gráfico de linha: crescimento da Inspira FM de 0 seguidores em janeiro de 2026 a 23.991 em 14 de julho, com salto de 15 mil para 24 mil na semana do reel viral.">' +
    grid +
    '<path d="' + areaD + '" fill="#017A5C" opacity="0.08"/>' +
    '<path d="' + lineD + '" fill="none" stroke="#017A5C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>' +
    dots + labels + ann + '</svg>';
}

/* =================== util =================== */
function escAttr(s){
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/&lt;(\/?b)&gt;/g,'<$1>').replace(/&lt;br&gt;/g,'<br>');
}
/* data-tip guarda HTML controlado (gerado aqui, sem input externo) */

/* =================== animação das barras ao entrar na tela =================== */
var chartIO = ('IntersectionObserver' in window) ? new IntersectionObserver(function(entries){
  entries.forEach(function(en){
    if(en.isIntersecting){
      if(!reduceMotion) en.target.classList.add('anim');
      chartIO.unobserve(en.target);
    }
  });
}, {threshold:.18}) : null;

function armCharts(){
  document.querySelectorAll('.bar-chart, #costBars').forEach(function(c){
    if(c.classList.contains('anim') || c.dataset.armed) return;
    c.dataset.armed = '1';
    if(chartIO && !reduceMotion) chartIO.observe(c);
  });
}

/* =================== Balanço Financeiro =================== */
var FIN_PASSWORD = null; // versão publicada: autenticação por decriptação
var FIN_KEY = 'inspira-fin-v1';
/* Os dados padrão da folha vivem DENTRO do bloco criptografado do Balanço
   (script JSON #finDefaults) — nunca em texto claro na versão publicada. */
var finData = null;
var finEditIdx = -1;

function finDefaults(){
  var el = document.getElementById('finDefaults');
  if(!el) return [];
  return JSON.parse(el.textContent).map(function(p){ return {n:p.n, s:p.s, f:p.f, v:p.v}; });
}
function finLoad(){
  try{
    var raw = localStorage.getItem(FIN_KEY);
    if(raw){ var d = JSON.parse(raw); if(Array.isArray(d) && d.length) return d; }
  }catch(e){}
  return finDefaults();
}
function finSave(){ try{ localStorage.setItem(FIN_KEY, JSON.stringify(finData)); }catch(e){} }
function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function finRelock(){
  var lock = document.getElementById('finLockWrap');
  var content = document.getElementById('finContent');
  if(!lock) return;
  lock.hidden = false;
  content.hidden = true;
  document.getElementById('finPwd').value = '';
  document.getElementById('finLockErr').textContent = '';
  finCancelEdit();
}
function finSetores(){
  var s = [];
  finData.forEach(function(p){ if(s.indexOf(p.s) < 0) s.push(p.s); });
  return s;
}
function finRender(){
  var filter = document.getElementById('finFilter').value || '__all';
  /* filtro por setor */
  var sel = document.getElementById('finFilter');
  var setores = finSetores();
  sel.innerHTML = '<option value="__all">Todos os setores</option>' + setores.map(function(s){
    return '<option value="' + escHtml(s) + '"' + (s === filter ? ' selected' : '') + '>' + escHtml(s) + '</option>';
  }).join('');
  if(filter !== '__all' && setores.indexOf(filter) < 0) filter = '__all';
  document.getElementById('finSetores').innerHTML = setores.map(function(s){
    return '<option value="' + escHtml(s) + '">';
  }).join('');

  var rows = '', total = 0, count = 0, semSalario = 0;
  finData.forEach(function(p, i){
    if(filter !== '__all' && p.s !== filter) return;
    count++;
    if(p.v > 0) total += p.v; else semSalario++;
    var sal = p.v > 0 ? '<td class="num">' + fmtBRL(p.v) + '</td>' : '<td class="num sal-nd">a definir</td>';
    rows += '<tr><td><b>' + escHtml(p.n) + '</b></td><td>' + escHtml(p.s) + '</td><td>' + escHtml(p.f) + '</td>' + sal +
      '<td style="white-space:nowrap"><button type="button" class="mini" data-edit="' + i + '">Editar</button> ' +
      '<button type="button" class="mini del" data-del="' + i + '">Excluir</button></td></tr>';
  });
  var totLbl = filter === '__all' ? 'Total geral' : 'Total — ' + escHtml(filter);
  rows += '<tr class="total"><td colspan="3">' + totLbl + ' (' + count + ' pessoa' + (count === 1 ? '' : 's') +
    (semSalario ? ' · ' + semSalario + ' sem salário informado' : '') + ')</td><td class="num">' + fmtBRL(total) + '</td><td></td></tr>';

  document.getElementById('finTable').innerHTML =
    '<table><thead><tr><th>Nome</th><th>Setor</th><th>Função</th><th class="num">Salário (R$/mês)</th><th></th></tr></thead><tbody>' +
    rows + '</tbody></table>';
}
function finCancelEdit(){
  finEditIdx = -1;
  var form = document.getElementById('finEditForm');
  if(!form) return;
  form.reset();
  document.getElementById('finFormTitle').textContent = 'Adicionar pessoa';
  document.getElementById('finSubmit').textContent = 'Adicionar';
  document.getElementById('finCancel').hidden = true;
}
function finMsg(t){
  var el = document.getElementById('finMsg');
  el.textContent = t;
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.textContent = ''; }, 3500);
}

function finUnlockOk(){
  document.getElementById('finLockWrap').hidden = true;
  document.getElementById('finContent').hidden = false;
  if(!finData) finData = finLoad();
  initFinBindings();
  document.getElementById('finFilter').value = '__all'; /* sempre abre completa */
  finRender();
}
function finFail(form){
  document.getElementById('finLockErr').textContent = 'Senha incorreta.';
  form.classList.remove('shake'); void form.offsetWidth; form.classList.add('shake');
  document.getElementById('finPwd').select();
}
var appInitDone = false;
function initApp(){
  if(appInitDone) return;
  appInitDone = true;
  buildFollowers();
  buildEngagement();
  buildCost();
  buildRanking();
  buildGrowth();
  document.getElementById('finLockForm').addEventListener('submit', function(ev){
    ev.preventDefault();
    var form = this;
    var val = document.getElementById('finPwd').value;
    if(ENC_FIN){
      setBusy(form, true, 'Abrindo…', 'Abrir');
      decryptPayload(ENC_FIN, val).then(function(html){
        document.getElementById('finContent').innerHTML = html;
        setBusy(form, false, 'Abrindo…', 'Abrir');
        finUnlockOk();
      }).catch(function(){ setBusy(form, false, 'Abrindo…', 'Abrir'); finFail(form); });
    }else if(val === FIN_PASSWORD){
      finUnlockOk();
    }else{
      finFail(form);
    }
  });
}
var finBound = false;
function initFinBindings(){
  if(finBound) return;
  finBound = true;
  document.getElementById('finFilter').addEventListener('change', finRender);
  document.getElementById('finReset').addEventListener('click', function(){
    if(!confirm('Restaurar a tabela para o padrão original? As edições feitas aqui serão perdidas.')) return;
    finData = finDefaults();
    finSave(); finCancelEdit(); finRender(); finMsg('Tabela restaurada.');
  });
  bindFinTableAndForm();
}
function bindFinTableAndForm(){
document.getElementById('finTable').addEventListener('click', function(ev){
  var btn = ev.target.closest('button'); if(!btn) return;
  if(btn.dataset.edit !== undefined){
    finEditIdx = +btn.dataset.edit;
    var p = finData[finEditIdx];
    document.getElementById('finNome').value = p.n;
    document.getElementById('finSetor').value = p.s;
    document.getElementById('finFuncao').value = p.f;
    document.getElementById('finSalario').value = p.v > 0 ? p.v : '';
    document.getElementById('finFormTitle').textContent = 'Editar: ' + p.n;
    document.getElementById('finSubmit').textContent = 'Salvar alterações';
    document.getElementById('finCancel').hidden = false;
    document.getElementById('finEditForm').scrollIntoView({block:'center', behavior: reduceMotion ? 'auto' : 'smooth'});
    document.getElementById('finNome').focus();
  }else if(btn.dataset.del !== undefined){
    var i = +btn.dataset.del;
    if(!confirm('Excluir "' + finData[i].n + '" da tabela?')) return;
    finData.splice(i, 1);
    finSave(); finCancelEdit(); finRender(); finMsg('Removido.');
  }
});
document.getElementById('finEditForm').addEventListener('submit', function(ev){
  ev.preventDefault();
  var p = {
    n: document.getElementById('finNome').value.trim(),
    s: document.getElementById('finSetor').value.trim(),
    f: document.getElementById('finFuncao').value.trim(),
    v: parseFloat(document.getElementById('finSalario').value) || 0
  };
  if(!p.n || !p.s || !p.f) return;
  if(finEditIdx >= 0){ finData[finEditIdx] = p; finMsg('Alterações salvas.'); }
  else{ finData.push(p); finMsg(p.n + ' adicionado(a).'); }
  finSave(); finCancelEdit(); finRender();
});
document.getElementById('finCancel').addEventListener('click', finCancelEdit);
}

/* =================== boot =================== */
try{
  var savedAuth = localStorage.getItem(AUTH_KEY);
  if(savedAuth){
    if(ENC_APP) attemptUnlock(savedAuth, false);
    else if(savedAuth === '1') unlock(null);
  }
}catch(e){}
</script>
